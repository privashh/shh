name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No version input: pnpm/action-setup reads "packageManager" from package.json, and
      # specifying both (even compatible ones, "10" vs "pnpm@10.19.0") makes it fail setup.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install circom
        run: |
          curl -L https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom
          circom --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Powers of Tau
        uses: actions/cache@v4
        with:
          path: packages/circuits/ptau
          key: ptau-pot16

      - name: Compile circuits + trusted setup (dev)
        run: pnpm circuits:compile && pnpm circuits:setup

      - name: Build SDK
        run: pnpm --filter @privashh/sdk build

      - name: Test — SDK
        run: pnpm --filter @privashh/sdk test

      - name: Test — circuits
        run: pnpm --filter @shh/circuits test

      - name: Test — contracts
        run: pnpm --filter @shh/contracts test

      - name: Build — wallet backend
        run: pnpm --filter @shh/web build
