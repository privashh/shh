# shh block explorer (Blockscout) pointed at the L3 op-geth RPC.
# Minimal stack: postgres + redis + backend + frontend.
#
# Joins the op-stack compose network (shh-devnet_default, external) so the backend can reach
# op-geth by service name. op-geth's public HTTP carries only web3/eth/net (no debug), so the
# internal-transaction (trace) and pending fetchers are disabled — blocks/txs/logs index fine,
# which is all the privacy events (Deposit, NewCommitment, RootPublished, …) need.

name: shh-explorer

networks:
  default:
    name: shh-devnet_default
    external: true

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-blockscout}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blockscout}
      POSTGRES_DB: ${DB_NAME:-blockscout}
    volumes:
      - explorer-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blockscout}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - explorer-redis:/data

  backend:
    image: ghcr.io/blockscout/blockscout:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    environment:
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: ${L2_RPC_HTTP:-http://op-geth:9545}
      ETHEREUM_JSONRPC_TRACE_URL: ${L2_RPC_HTTP:-http://op-geth:9545}
      ETHEREUM_JSONRPC_WS_URL: ${L2_RPC_WS:-ws://op-geth:8546}
      DATABASE_URL: postgresql://${DB_USER:-blockscout}:${DB_PASSWORD:-blockscout}@db:5432/${DB_NAME:-blockscout}
      ECTO_USE_SSL: "false"
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      CHAIN_ID: ${L2_CHAIN_ID:-55666}
      COIN: ${COIN:-ETH}
      NETWORK: shh
      SUBNETWORK: shh L3
      PORT: "4000"
      API_V2_ENABLED: "true"
      DISABLE_EXCHANGE_RATES: "true"
      # op-geth's public HTTP has no debug namespace → skip trace-based fetchers.
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    image: ghcr.io/blockscout/frontend:latest
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_HOST: ${EXPLORER_DOMAIN:-localhost}
      NEXT_PUBLIC_API_PROTOCOL: ${EXPLORER_PROTOCOL:-http}
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ${EXPLORER_WS:-ws}
      NEXT_PUBLIC_APP_HOST: ${EXPLORER_DOMAIN:-localhost}
      NEXT_PUBLIC_APP_PROTOCOL: ${EXPLORER_PROTOCOL:-http}
      NEXT_PUBLIC_NETWORK_NAME: shh
      NEXT_PUBLIC_NETWORK_SHORT_NAME: shh
      NEXT_PUBLIC_NETWORK_ID: ${L2_CHAIN_ID:-55666}
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: Ether
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ${COIN:-ETH}
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_IS_TESTNET: "true"
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  explorer-db:
  explorer-redis:
