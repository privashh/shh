# shh — local single-sequencer OP Stack L3 (Phase 2 template).
# Boot requires ./configs/{genesis.json,rollup.json,jwt.txt}, produced by ./scripts/generate.sh.
# Until then this file documents the intended topology; see README.md.

name: shh-devnet

services:
  # Settlement layer: a fork of Base Sepolia. Swap for the live RPC to target real Base.
  l1:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint:
      - anvil
      - --host=0.0.0.0
      - --fork-url=${L1_RPC:-https://sepolia.base.org}
      - --chain-id=${L1_CHAIN_ID:-84532}
    ports:
      - "8545:8545"

  op-geth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:latest
    depends_on: [l1]
    command:
      - --datadir=/data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=9545
      - --http.api=web3,debug,eth,net,engine
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.jwtsecret=/config/jwt.txt
      - --rollup.sequencerhttp=http://op-node:8547
    volumes:
      - ./configs:/config:ro
      - geth-data:/data
    ports:
      - "9545:9545"

  op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:latest
    depends_on: [op-geth]
    command:
      - op-node
      - --l1=http://l1:8545
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/rollup.json
      - --sequencer.enabled
      - --sequencer.l1-confs=0
      - --p2p.disable
      - --rpc.addr=0.0.0.0
      - --rpc.port=8547
    environment:
      - OP_NODE_P2P_SEQUENCER_KEY=${GS_SEQUENCER_PRIVATE_KEY}
    volumes:
      - ./configs:/config:ro

  op-batcher:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-batcher:latest
    depends_on: [op-node]
    command:
      - op-batcher
      - --l1-eth-rpc=http://l1:8545
      - --l2-eth-rpc=http://op-geth:9545
      - --rollup-rpc=http://op-node:8547
      - --private-key=${GS_BATCHER_PRIVATE_KEY}
      - --max-channel-duration=1

  op-proposer:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-proposer:latest
    depends_on: [op-node]
    # Modern OP Stack uses fault proofs: the proposer posts to the DisputeGameFactory.
    # DGF_ADDRESS is written into .env by scripts/generate from the op-deployer output.
    command:
      - op-proposer
      - --l1-eth-rpc=http://l1:8545
      - --rollup-rpc=http://op-node:8547
      - --private-key=${GS_PROPOSER_PRIVATE_KEY}
      - --game-factory-address=${DGF_ADDRESS}
      - --game-type=${OP_GAME_TYPE:-1}
      - --proposal-interval=12s
      - --poll-interval=12s

volumes:
  geth-data:
