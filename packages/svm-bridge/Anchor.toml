[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.mainnet]
shh_bridge = "bcnPMqscm6oy1KM6BKTwVjhs2QEBXs2U81FSixJzUhG"

[registry]
url = "https://api.apr.dev"

# cluster/wallet are passed at deploy time via --provider.* flags (the wallet is the
# upgrade-authority key, kept out of the repo).
[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
