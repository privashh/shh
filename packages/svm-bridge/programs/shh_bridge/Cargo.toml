[package]
name = "shh_bridge"
version = "0.1.0"
edition = "2021"
description = "L1 (Solana) bridge vault for the shh SVM L2: SOL custody + deposit log + operator-signed withdrawals"

[lib]
crate-type = ["cdylib", "lib"]
name = "shh_bridge"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.31.1"
